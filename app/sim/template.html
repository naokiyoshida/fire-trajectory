<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIRE シミュレーション</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f6f8; --card: #ffffff; --text: #1f2933; --muted: #6b7280;
    --border: #e3e6ea; --blue: #1565c0; --orange: #e65100;
  }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    margin: 0 auto; max-width: 1280px; padding: 20px;
    background: var(--bg); color: var(--text); line-height: 1.5; }
  header { margin-bottom: 14px; }
  h1 { font-size: 19px; margin: 0; letter-spacing: .02em; }
  .gen { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .headline { font-size: 15px; font-weight: 600; padding: 13px 16px;
    border-radius: 10px; background: #e8f4fd; border: 1px solid #bcdffb;
    margin-bottom: 16px; line-height: 1.65; }
  .headline.warn { background: #fdecec; border-color: #f3c4c4; }
  .divinfo { font-size: 13px; color: var(--muted); margin: -8px 0 16px;
    padding: 9px 14px; background: #f0f7f0; border: 1px solid #d6e8d6;
    border-radius: 9px; line-height: 1.6; }
  .divinfo b { color: #2e7d32; font-weight: 600; font-variant-numeric: tabular-nums; }
  .wrap { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }
  .chartbox { flex: 2 1 560px; min-width: 300px; position: sticky;
    top: 12px; align-self: flex-start; }
  .panel { flex: 1 1 320px; min-width: 280px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px; padding: 16px;
    box-shadow: 0 1px 3px rgba(16,24,40,.04); }
  canvas { width: 100%; height: 380px; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px;
    display: block; touch-action: none; }
  #tip { position: absolute; display: none; pointer-events: none;
    background: rgba(31,41,51,.94); color: #fff; font-size: 12px;
    padding: 6px 9px; border-radius: 6px; line-height: 1.45; white-space: nowrap;
    z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,.18); }
  .legend { font-size: 12px; margin-top: 8px; color: var(--muted); line-height: 1.7; }
  .legend .b { color: var(--blue); font-weight: 600; }
  .legend .o { color: var(--orange); font-weight: 600; }
  .profiles { margin-bottom: 12px; font-size: 13px; display: flex;
    align-items: center; gap: 12px; }
  .profiles label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
  .sld { margin: 12px 0; }
  .sld-head { display: flex; justify-content: space-between; align-items: center;
    gap: 8px; margin-bottom: 5px; }
  .sld-head .name { font-size: 13px; }
  .sld-head .field { display: flex; align-items: baseline; gap: 4px; white-space: nowrap; }
  .sld-head .num { width: 76px; text-align: right; font-size: 13px; font-weight: 600;
    font-variant-numeric: tabular-nums; padding: 3px 6px; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; background: #fff; }
  .sld-head .num:focus { outline: none; border-color: #90caf9;
    box-shadow: 0 0 0 2px rgba(144,202,249,.5); }
  .sld-head .unit { font-size: 12px; color: var(--muted); min-width: 1.4em; }
  .sld input[type=range] { width: 100%; accent-color: var(--blue); margin: 2px 0 0; }
  .sld .ticks { display: flex; justify-content: space-between; font-size: 10px;
    color: #9aa1a9; margin-top: 1px; font-variant-numeric: tabular-nums; }
  .sld-group { font-size: 11px; font-weight: 700; color: var(--muted);
    margin: 18px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
    letter-spacing: .08em; }
  .sld-group:first-child { margin-top: 4px; }
  .actions { display: flex; gap: 8px; margin-top: 16px; }
  button { font-size: 13px; padding: 6px 12px; border: 1px solid var(--border);
    background: #fff; color: var(--text); border-radius: 8px; cursor: pointer; }
  button:hover { background: #eef1f4; }
  #dbgBtn { margin-top: 10px; }
  pre { max-height: 240px; overflow: auto; background: #f3f3f3;
    font-size: 11px; padding: 8px; border-radius: 6px; display: none; margin-top: 8px; }
</style>
</head>
<body>
<header>
  <h1>FIRE シミュレーション</h1>
  <div class="gen">生成: __GENERATED_AT__ ・ ローカル計算（外部送信なし）</div>
</header>
<div id="headline" class="headline">—</div>
<div id="divinfo" class="divinfo"></div>
<div class="wrap">
  <div class="chartbox">
    <canvas id="chart" width="900" height="380"></canvas>
    <div id="tip"></div>
    <div class="legend">
      <span class="b">― 期末資産（このまま働き続けた予想）</span><br>
      <span class="o">― FIRE必要資産（働かなくても目標年齢まで持つ最低額）</span><br>
      緑＝FIRE可能時期 / 赤＝資産枯渇 ・ グラフにカーソルを乗せると各月の値
    </div>
    <button id="dbgBtn" type="button">デバッグ表を表示/非表示</button>
    <pre id="dbg"></pre>
  </div>
  <div class="panel">
    <div class="profiles">
      <span>表示:</span>
      <label><input type="radio" name="prof" value="simple"> シンプル</label>
      <label><input type="radio" name="prof" value="detailed" checked> 詳細</label>
    </div>
    <div id="sliders"></div>
    <div class="actions">
      <button id="resetBtn" type="button">初期値に戻す</button>
    </div>
  </div>
</div>

<script>
/* ===== シミュレーションエンジン（engine.ts を transpile して埋め込み） ===== */
__ENGINE_JS__
/* ===== 入力値・スライダー定義 ===== */
var BASE_PARAMS = __PARAMS_JSON__;
var SLIDERS = __SLIDERS_JSON__;
var PROFILE = "__PROFILE_DEFAULT__";

(function () {
  var params = Object.assign({}, BASE_PARAMS);
  var canvas = document.getElementById("chart");
  var ctx = canvas.getContext("2d");
  var tip = document.getElementById("tip");
  var lastRes = null;   // 直近の simulate 結果（リサイズ/ホバー再描画用）
  var hoverIdx = -1;    // マウスオーバー中の月インデックス
  var layout = null;    // 直近の描画ジオメトリ（ヒットテスト用）

  function fmt(v, unit) {
    if (unit === "%") return (v * 100).toFixed(1) + "%";
    if (unit === "万円") return Math.round(v / 10000).toLocaleString() + "万";
    if (unit === "歳") return v + "歳";
    return Math.round(v).toLocaleString() + "円";
  }
  // 数値直接入力欄は「表示単位」で扱う（%なら 5.0=5%、万円なら 35.5=35.5万）。
  // スライダーと params は常に内部値（生）。toDisp/fromDisp が両者を相互変換する。
  function toDisp(v, unit) {
    if (unit === "%") return Math.round(v * 1000) / 10;     // 0.05 -> 5.0
    if (unit === "万円") return Math.round(v / 100) / 100;   // 355000 -> 35.5
    return v;                                                // 歳 / 円
  }
  function fromDisp(x, unit) {
    if (unit === "%") return x / 100;
    if (unit === "万円") return x * 10000;
    return x;
  }
  function dispStep(unit, rawStep) {
    if (unit === "%") return Math.round(rawStep * 100000) / 1000; // 0.001 -> 0.1
    if (unit === "万円") return rawStep / 10000;                   // 5000 -> 0.5
    return rawStep;                                               // 歳:1
  }
  function unitShort(unit) { return unit === "万円" ? "万" : unit; }
  function yen(v) { return "¥" + Math.round(v).toLocaleString(); }
  // Y 軸目盛りラベル（億 / 万）
  function moneyLabel(v) {
    if (Math.abs(v) >= 1e8) return (v / 1e8).toFixed(2).replace(/\.?0+$/, "") + "億";
    if (Math.abs(v) >= 1e4) return Math.round(v / 1e4).toLocaleString() + "万";
    return String(Math.round(v));
  }
  // 0..max を「キリのよい」目盛り列に（5本前後）。最上段の目盛りは必ず
  // max 以上にする：従来は終了条件の切り捨てで top<max になり得て、
  // スライダー操作で期末資産ピークが top を超え、line() の v>top スキップで
  // グラフが上に突き抜けて見えなくなる不具合があった（インフレ0% 等で再現）。
  function niceTicks(max) {
    if (max <= 0) return [0, 1];
    var rough = max / 4;
    var pow = Math.pow(10, Math.floor(Math.log(rough) / Math.LN10));
    var u = rough / pow;
    var step = (u >= 5 ? 10 : u >= 2 ? 5 : u >= 1 ? 2 : 1) * pow;
    var topTick = Math.ceil(max / step - 1e-9) * step; // 必ず max 以上
    var ticks = [];
    for (var t = 0; t <= topTick + step * 0.5; t += step) ticks.push(t);
    return ticks;
  }
  // CSS サイズ × devicePixelRatio でバッキングストアを設定（Retina/スマホで鮮明に）
  function fit() {
    var dpr = window.devicePixelRatio || 1;
    var cssW = canvas.clientWidth || 900;
    var cssH = canvas.clientHeight || 360;
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { W: cssW, H: cssH };
  }

  function draw(res) {
    var dim = fit();
    var W = dim.W, H = dim.H;
    var padL = 64, padB = 30, padT = 14, padR = 14;
    ctx.clearRect(0, 0, W, H);
    var rows = res.monthly, n = rows.length;
    if (!n) return;

    // 縦軸は 0 起点・期末資産（青）に合わせてスケール。可視域 [0, top] の
    // 外（序盤の巨大な FIRE必要資産＝上端超、枯渇後の負の期末資産＝0未満）
    // は描かず途切れさせる。偽の水平線（上端/0 への張り付き）を出さない。
    // 枯渇は赤い縦ラベルで別途明示。
    var hiData = 0;
    for (var i = 0; i < n; i++) {
      if (rows[i].endAssets > hiData) hiData = rows[i].endAssets;
    }
    if (hiData <= 0) hiData = 1;
    var ticks = niceTicks(hiData);
    var top = ticks[ticks.length - 1];

    function X(i) { return padL + (W - padL - padR) * (n === 1 ? 0 : i / (n - 1)); }
    function Y(v) { var c = v < 0 ? 0 : v; return padT + (H - padT - padB) * (1 - c / top); }
    layout = { n: n, X: X, Y: Y, padL: padL, padR: padR, W: W };

    // Y 目盛り＋横グリッド＋値ラベル
    ctx.font = "11px sans-serif"; ctx.textBaseline = "middle";
    for (var k = 0; k < ticks.length; k++) {
      var ty = Y(ticks[k]);
      ctx.strokeStyle = ticks[k] === 0 ? "#bbb" : "#eee";
      ctx.beginPath(); ctx.moveTo(padL, ty); ctx.lineTo(W - padR, ty); ctx.stroke();
      ctx.fillStyle = "#666"; ctx.textAlign = "right";
      ctx.fillText(moneyLabel(ticks[k]), padL - 6, ty);
    }
    // X 目盛り（年ラベル）。描画幅から最大本数を見積もり N 年おきに間引く。
    // 細かい値はマウスオーバーで読めるので粗い目盛りで十分（重なり防止）。
    ctx.textAlign = "center"; ctx.textBaseline = "top";
    var firstYr = +rows[0].ym.slice(0, 4);
    var spanYr = Math.max(1, (+rows[n - 1].ym.slice(0, 4)) - firstYr);
    var maxLabels = Math.max(2, Math.floor((W - padL - padR) / 56));
    var yearStride = Math.max(1, Math.ceil(spanYr / maxLabels));
    var lastYr = null;
    for (var x = 0; x < n; x++) {
      var yr = rows[x].ym.slice(0, 4);
      if (rows[x].ym.slice(5) !== "01" || yr === lastYr) continue;
      if ((+yr - firstYr) % yearStride !== 0) continue;
      lastYr = yr;
      var gx = X(x);
      ctx.strokeStyle = "#f3f3f3";
      ctx.beginPath(); ctx.moveTo(gx, padT); ctx.lineTo(gx, H - padB); ctx.stroke();
      ctx.fillStyle = "#666";
      ctx.fillText(yr, gx, H - padB + 6);
    }

    // 可視域 [0, top] の外は描かず途切れさせる：序盤の巨大な FIRE必要資産
    // （> top）も、枯渇後の負の期末資産（< 0）も、偽の水平線にしない。
    function line(getter, color) {
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
      var started = false;
      for (var i = 0; i < n; i++) {
        var v = getter(rows[i]);
        if (v == null || v > top || v < 0) { started = false; continue; }
        var px = X(i), py = Y(v);
        if (!started) { ctx.moveTo(px, py); started = true; } else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    line(function (r) { return r.endAssets; }, "#1565c0");
    line(function (r) { return r.fireNeed; }, "#e65100");

    // 縦マーカー（退職 / FIRE可能時期 / 資産枯渇）に日付ラベルを添える。
    // atBottom=true はラベルを下端に置く（退職線とFIRE/枯渇線の重なりを避ける）。
    function vmark(ym, color, label, atBottom) {
      for (var j = 0; j < n; j++) {
        if (rows[j].ym === ym) {
          var vx = X(j);
          ctx.strokeStyle = color; ctx.setLineDash([4, 3]);
          ctx.beginPath(); ctx.moveTo(vx, padT); ctx.lineTo(vx, H - padB); ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = color; ctx.font = "11px sans-serif";
          var right = vx > W - 96;
          ctx.textAlign = right ? "right" : "left";
          ctx.textBaseline = atBottom ? "bottom" : "top";
          ctx.fillText(label, vx + (right ? -4 : 4), atBottom ? H - padB - 2 : padT + 1);
          return;
        }
      }
    }
    // 退職線（本人）はエンジンが返す retireYm を使う＝UI で退職月を再計算しない。
    if (res.retireYm) vmark(res.retireYm, "#5c6bc0", "退職 " + res.retireYm, true);
    if (res.fireDate) vmark(res.fireDate, "#2e7d32", "FIRE可能 " + res.fireDate);
    if (res.depletionMonth) vmark(res.depletionMonth, "#c62828", "資産枯渇 " + res.depletionMonth);

    // ホバー：ガイド線＋データ点
    if (hoverIdx >= 0 && hoverIdx < n) {
      var hx = X(hoverIdx), rr = rows[hoverIdx];
      ctx.strokeStyle = "#9e9e9e"; ctx.setLineDash([2, 2]);
      ctx.beginPath(); ctx.moveTo(hx, padT); ctx.lineTo(hx, H - padB); ctx.stroke();
      ctx.setLineDash([]);
      if (rr.endAssets >= 0 && rr.endAssets <= top) {
        ctx.fillStyle = "#1565c0";
        ctx.beginPath(); ctx.arc(hx, Y(rr.endAssets), 3.5, 0, 7); ctx.fill();
      }
      if (rr.fireNeed != null && rr.fireNeed >= 0 && rr.fireNeed <= top) {
        ctx.fillStyle = "#e65100";
        ctx.beginPath(); ctx.arc(hx, Y(rr.fireNeed), 3.5, 0, 7); ctx.fill();
      }
    }
  }

  function moveTip(evt) {
    if (!lastRes || !layout) return;
    var rect = canvas.getBoundingClientRect();
    var pt = evt.touches ? evt.touches[0] : evt;
    var mx = pt.clientX - rect.left;
    var n = layout.n;
    var frac = (mx - layout.padL) / (layout.W - layout.padL - layout.padR);
    var i = Math.round(frac * (n - 1));
    if (i < 0) i = 0; if (i > n - 1) i = n - 1;
    if (i !== hoverIdx) { hoverIdx = i; draw(lastRes); }
    var r = lastRes.monthly[i];
    tip.style.display = "block";
    tip.innerHTML = "<b>" + r.ym + "</b>（本人 " + r.ageSelf + "歳 / 配偶者 " +
      r.ageSpouse + "歳）<br>" +
      "期末資産 " + yen(r.endAssets) + "<br>" +
      "FIRE必要 " + (r.fireNeed == null ? "—" : yen(r.fireNeed));
    var tw = tip.offsetWidth || 150;
    var tx = pt.clientX - rect.left + 14;
    var ty = pt.clientY - rect.top + 14;
    if (tx + tw > layout.W) tx = layout.W - tw - 4;
    tip.style.left = tx + "px";
    tip.style.top = ty + "px";
  }
  function hideTip() {
    if (hoverIdx === -1) return;
    hoverIdx = -1; tip.style.display = "none";
    if (lastRes) draw(lastRes);
  }
  canvas.addEventListener("mousemove", moveTip);
  canvas.addEventListener("mouseleave", hideTip);
  canvas.addEventListener("touchstart", moveTip, { passive: true });
  canvas.addEventListener("touchmove", moveTip, { passive: true });

  function headline(res) {
    var el = document.getElementById("headline");
    if (res.fireDate) {
      el.className = "headline";
      el.textContent = "FIRE可能時期: " + res.fireDate +
        "（本人 " + res.ageAtFire + "歳）　" +
        "この時期に退職した場合の終了年齢資産: " +
        yen(res.fireEndAssets) + "（" + res.verdict + "）" +
        (res.endAssetsAtSimEnd < 0
          ? "　※現行プラン（リタイア予定日まで就労）だと終了資産は "
            + yen(res.endAssetsAtSimEnd) + "。早く（FIRE可能時期に）退職する方が有利。"
          : "　／現行プラン（就労継続）の終了資産: " + yen(res.endAssetsAtSimEnd));
    } else {
      el.className = "headline warn";
      var dep = res.depletionMonth, depAge = "";
      if (dep) {
        var dm = res.monthly.find(function (x) { return x.ym === dep; });
        if (dm) depAge = "・本人 " + dm.ageSelf + "歳";
      }
      el.textContent = "現状の設定では目標年齢までに FIRE 必要資産へ到達しません" +
        (dep ? "（資産枯渇: " + dep + depAge + "）" : "") +
        "　終了年齢資産: " + yen(res.endAssetsAtSimEnd) +
        " ／ 生活費・退職年齢・年金開始・想定利回りのスライダーで改善余地を試せます。";
    }
  }

  // 分配金リアリティチェック: 年額の概算（dividendYield×資産・グロス）と
  // 基本生活費に対するカバー率。「分配で生活費」戦略の妥当性を可視化する
  // （残りは年金＋資産取り崩しで充当）。退職時アンカーはエンジンが返す
  // res.assetsAtRetire / res.retireYm を使い、退職月を UI で再計算しない。
  function dividendInfo(res) {
    var el = document.getElementById("divinfo");
    var dy = params.dividendYield || 0;
    var living = params.baseLivingMonthly * 12;
    if (dy <= 0 || living <= 0) { el.style.display = "none"; return; }
    el.style.display = "block";
    var man = function (v) { return (v / 10000).toFixed(1); }; // 円→万円(0.1万単位)
    var pct = function (v) { return Math.round((v / living) * 100); };
    var divNow = dy * params.currentAssets;
    var divRet = dy * res.assetsAtRetire;
    el.innerHTML =
      "分配金（年額・概算グロス）: 現在 <b>¥" + man(divNow) + "万</b>（基本生活費の約" +
      pct(divNow) + "%） → 退職時" + res.retireYm + " <b>¥" + man(divRet) + "万</b>（約" +
      pct(divRet) + "%）。残りは年金＋資産取り崩しで充当（増配で分配は年々増加）。";
  }

  function dumpTable(res) {
    var lines = ["年月\t本人\t期首\t収入\t支出\t収支\t期末\tFIRE必要\t実質係数\t年金実質"];
    res.monthly.forEach(function (r) {
      lines.push([r.ym, r.ageSelf, Math.round(r.openAssets), Math.round(r.income),
        Math.round(r.expense), Math.round(r.net), Math.round(r.endAssets),
        r.fireNeed == null ? "" : Math.round(r.fireNeed),
        r.deflator.toFixed(4), Math.round(r.pensionReal)].join("\t"));
    });
    document.getElementById("dbg").textContent = lines.join("\n");
  }

  function recompute() {
    // 二重地平をなくす: FIRE必要資産（I列）の地平 fireTargetAge と、判定・グラフの
    // 終了年齢 simEndAge を常に一致させる（「想定寿命」スライダー1本で両方動かす）。
    params.simEndAge = params.fireTargetAge;
    var res = simulate(params);
    lastRes = res;
    draw(res); headline(res); dividendInfo(res); dumpTable(res);
  }

  function renderSliders() {
    var box = document.getElementById("sliders");
    box.innerHTML = "";
    var curGroup = null;
    SLIDERS.filter(function (s) { return s.profiles.indexOf(PROFILE) >= 0; })
      .forEach(function (s) {
        if (s.group !== curGroup) {
          curGroup = s.group;
          var hd = document.createElement("div");
          hd.className = "sld-group"; hd.textContent = s.group;
          box.appendChild(hd);
        }
        // 初期値が SliderDef.min/max を逸脱していたら範囲内へ丸めて params にも反映。
        // input range は表示はクリップするが value 属性経由で超過値を保持し続け、
        // 最初の simulate が範囲外で走る経路があるので、ここで一度きり clamp する。
        var v0 = Math.min(Math.max(params[s.key], s.min), s.max);
        if (v0 !== params[s.key]) params[s.key] = v0;

        var wrap = document.createElement("div"); wrap.className = "sld";

        // 見出し行: 名称 + 数値直接入力欄 + 単位
        var head = document.createElement("div"); head.className = "sld-head";
        var name = document.createElement("span"); name.className = "name";
        name.textContent = s.label;
        var field = document.createElement("span"); field.className = "field";
        var num = document.createElement("input");
        num.type = "number"; num.className = "num";
        num.min = toDisp(s.min, s.unit); num.max = toDisp(s.max, s.unit);
        num.step = dispStep(s.unit, s.step);
        num.value = toDisp(params[s.key], s.unit);
        var unit = document.createElement("span"); unit.className = "unit";
        unit.textContent = unitShort(s.unit);
        field.appendChild(num); field.appendChild(unit);
        head.appendChild(name); head.appendChild(field);

        // スライダー本体
        var rng = document.createElement("input");
        rng.type = "range"; rng.min = s.min; rng.max = s.max;
        rng.step = s.step; rng.value = params[s.key];

        // 範囲ヒント（min / max を表示単位で）
        var ticks = document.createElement("div"); ticks.className = "ticks";
        var tlo = document.createElement("span");
        tlo.textContent = toDisp(s.min, s.unit) + unitShort(s.unit);
        var thi = document.createElement("span");
        thi.textContent = toDisp(s.max, s.unit) + unitShort(s.unit);
        ticks.appendChild(tlo); ticks.appendChild(thi);

        // 内部値を範囲内へ収め、params 反映＋再計算。収めた値を返す。
        function apply(raw) {
          raw = Math.min(Math.max(raw, s.min), s.max);
          params[s.key] = raw;
          recompute();
          return raw;
        }
        // スライダー操作 → 数値欄を追従
        rng.addEventListener("input", function () {
          num.value = toDisp(apply(parseFloat(rng.value)), s.unit);
        });
        // 数値直接入力 → スライダーを追従（入力中は欄の表示はそのまま、
        // 確定時=change で範囲内へ正規化表示）
        num.addEventListener("input", function () {
          var x = parseFloat(num.value);
          if (!isFinite(x)) return;
          rng.value = apply(fromDisp(x, s.unit));
        });
        num.addEventListener("change", function () {
          var x = parseFloat(num.value);
          if (!isFinite(x)) { num.value = toDisp(params[s.key], s.unit); return; }
          var raw = apply(fromDisp(x, s.unit));
          rng.value = raw;
          num.value = toDisp(raw, s.unit);
        });

        wrap.appendChild(head); wrap.appendChild(rng); wrap.appendChild(ticks);
        box.appendChild(wrap);
      });
  }

  document.querySelectorAll('input[name=prof]').forEach(function (r) {
    r.addEventListener("change", function () {
      if (r.checked) { PROFILE = r.value; renderSliders(); }
    });
  });
  document.getElementById("resetBtn").addEventListener("click", function () {
    params = Object.assign({}, BASE_PARAMS); renderSliders(); recompute();
  });
  document.getElementById("dbgBtn").addEventListener("click", function () {
    var d = document.getElementById("dbg");
    d.style.display = d.style.display === "block" ? "none" : "block";
  });

  // ウィンドウ/レイアウト幅の変化でグラフを再描画（スマホ回転・分割表示）
  if (window.ResizeObserver) {
    new ResizeObserver(function () { if (lastRes) draw(lastRes); }).observe(canvas);
  } else {
    window.addEventListener("resize", function () { if (lastRes) draw(lastRes); });
  }

  renderSliders();
  recompute();
})();
</script>
</body>
</html>
